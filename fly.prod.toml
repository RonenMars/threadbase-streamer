# fly.toml for the production threadbase deployment with Claude Code API.
#
# Lives at the repo root because Fly resolves [build].dockerfile relative to
# this file's directory. Build context = repo root, so docker/Dockerfile can
# COPY src/, package.json, vendor/, etc.
#
# Deploy from the repo root: `fly deploy --config fly.prod.toml --remote-only`.
#
# Secrets and runtime knobs that should not live in source:
#   - PROD_API_KEY        (set via `fly secrets set PROD_API_KEY=…`)
#   - CLAUDE_API_KEY      (set via `fly secrets set CLAUDE_API_KEY=…`)
#   - THREADBASE_PUBLIC_URL (defaults to the assigned hostname; override
#     only if pointing at a custom domain)
#
# Resource notes: 1GB memory for sqlite + PTY + node_modules.
#
# TEMPORARY (App Store review): the machine is pinned always-on
# (auto_stop_machines = 'off', min_machines_running = 1) so an Apple reviewer
# never hits a cold start. This incurs ~$5-6/mo of idle cost. REVERT after the
# app is approved: set auto_stop_machines = 'stop' and min_machines_running = 0,
# then redeploy.

app = 'threadbase'
primary_region = 'iad'

[build]
  dockerfile = 'docker/Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = 'prod_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
