name: "Run CI"
description: "Sets up Node, restores cached node_modules, and runs one CI command (lint, build, or test)."

inputs:
  node-version:
    description: "Node.js version to set up"
    required: true
  command:
    # GitHub composite-action inputs have no native enum/allowed-values schema,
    # so the allowed set is enforced by the "Validate command" step below.
    description: "Which CI command to run. One of: lint | build | test"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate command
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
      run: |
        case "$COMMAND" in
          lint|build|test) ;;
          *)
            echo "::error title=Invalid run-ci command::'$COMMAND' is not allowed. Expected one of: lint, build, test."
            exit 1
            ;;
        esac

    - name: Set up Node ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Restore node_modules cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          vendor/agent-types/node_modules
          vendor/agent-types/dist
          vendor/scanner/node_modules
          vendor/scanner/dist
        key: node-modules-v4-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

    - name: Install build tools for node-pty
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y python3 make g++

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: "Relink file: deps (symlinks not preserved by cache)"
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: npm install --prefer-offline --ignore-scripts

    - name: Rebuild native modules
      if: inputs.command == 'test' && steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm rebuild better-sqlite3

    - name: Save node_modules cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          node_modules
          vendor/agent-types/node_modules
          vendor/agent-types/dist
          vendor/scanner/node_modules
          vendor/scanner/dist
        key: node-modules-v4-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

    # On a cache hit, better-sqlite3 was already rebuilt the run that
    # populated this cache — invoke vitest directly to skip npm test's
    # `pretest` hook (npm rebuild better-sqlite3), which would otherwise
    # unconditionally recompile it again on every run.
    - name: Run ${{ inputs.command }}
      if: "!(inputs.command == 'test' && steps.cache.outputs.cache-hit == 'true')"
      shell: bash
      run: npm run ${{ inputs.command }}

    - name: Run test (cache hit)
      if: inputs.command == 'test' && steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx vitest run
