name: Setup
description: Install and cache node_modules (with submodule support)

inputs:
  node-version:
    description: "Node.js version to set up and key the cache on"
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Restore node_modules cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          vendor/agent-types/node_modules
          vendor/agent-types/dist
          vendor/scanner/node_modules
          vendor/scanner/dist
        key: node-modules-v4-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

    - name: Install build tools for node-pty
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y python3 make g++

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    # Rebuild the native binary for THIS node version before saving, so the
    # test job's cache-hit path (which runs `npx vitest` without rebuilding)
    # gets an ABI-correct better-sqlite3 for node 20/24, not just node 22.
    - name: Rebuild native modules
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm rebuild better-sqlite3

    - name: Save node_modules cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          node_modules
          vendor/agent-types/node_modules
          vendor/agent-types/dist
          vendor/scanner/node_modules
          vendor/scanner/dist
        key: node-modules-v4-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}
