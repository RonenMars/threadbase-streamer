name: Setup
description: Install and cache node_modules (with submodule support)

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Restore node_modules cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: |
          node_modules
          vendor/agent-types/node_modules
          vendor/agent-types/dist
          vendor/scanner/node_modules
        key: node-modules-v2-${{ hashFiles('package-lock.json') }}

    - name: Install build tools for node-pty
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y python3 make g++

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: Save node_modules cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          node_modules
          vendor/agent-types/node_modules
          vendor/agent-types/dist
          vendor/scanner/node_modules
        key: node-modules-v2-${{ hashFiles('package-lock.json') }}
