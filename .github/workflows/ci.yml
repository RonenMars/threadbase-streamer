name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Decide whether to skip the heavy CI work. The required status checks
  # (Lint, Test (Node 20), Test (Node 22)) are enforced by branch protection,
  # so the jobs below must ALWAYS run and report success — a job skipped via a
  # job-level `if:` reports "skipped", which does NOT satisfy a required check
  # and would leave the PR un-mergeable forever. Instead each job always runs
  # but guards its single heavy step on this gate, so the check context still
  # goes green (in seconds) when `--skip-ci` is present in the latest commit
  # message, the PR title, or the PR body.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
    steps:
      - id: decide
        env:
          # On pull_request, github.event.head_commit is null, so fall back to
          # the PR title/body. On push to main, the PR fields are empty and we
          # use the head commit message.
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          haystack="${HEAD_COMMIT_MSG}
          ${PR_TITLE}
          ${PR_BODY}"
          if printf '%s' "$haystack" | grep -qF -- '--skip-ci'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=CI skipped::'--skip-ci' found in commit message / PR title / PR body — heavy step skipped, check reported green."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint
        if: needs.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y python3 make g++
          npm install
          npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        if: needs.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y python3 make g++
          npm install
          npm run build

      - if: needs.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [gate, lint]
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Test
        if: needs.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y python3 make g++
          npm install
          npm test
