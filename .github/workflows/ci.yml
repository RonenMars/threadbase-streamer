name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Decide whether to skip the heavy CI work. The required status checks
  # (Lint, Test (Node 20), Test (Node 22)) are enforced by branch protection,
  # so the jobs below must ALWAYS run and report success — a job skipped via a
  # job-level `if:` reports "skipped", which does NOT satisfy a required check
  # and would leave the PR un-mergeable forever. Instead each job checks out
  # (cheap, and required so the local composite action exists) and then runs a
  # single guarded `run-ci` step. When the bracketed tag `[skip-ci]` is present
  # in the latest commit message, the PR title, or the PR body, that one step
  # is skipped, the job still succeeds, and the check context goes green in
  # seconds. The tag is bracketed (not a bare `--skip-ci`) so prose that merely
  # mentions it — like this comment, or a PR describing the feature — does not
  # accidentally trip the skip.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
    steps:
      - id: decide
        env:
          # On pull_request, github.event.head_commit is null, so fall back to
          # the PR title/body. On push to main, the PR fields are empty and we
          # use the head commit message.
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          haystack="${HEAD_COMMIT_MSG}
          ${PR_TITLE}
          ${PR_BODY}"
          if printf '%s' "$haystack" | grep -qF -- '[skip-ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=CI skipped::'[skip-ci]' found in commit message / PR title / PR body — run-ci step skipped, check reported green."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: gate
    steps:
      # Checkout is unguarded and first: the local composite action below only
      # exists on disk after the repo is checked out.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Lint
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: 20
          command: lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: 20
          command: build

      - if: needs.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [gate, lint]
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test
        if: needs.gate.outputs.skip != 'true'
        uses: ./.github/actions/run-ci
        with:
          node-version: ${{ matrix.node-version }}
          command: test
