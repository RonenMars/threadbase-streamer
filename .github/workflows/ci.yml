name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.SCANNER_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build tools for node-pty
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Build scanner
        run: cd vendor/scanner && npm install && npm run build

      - run: npm install

      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.SCANNER_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build tools for node-pty
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Build scanner
        run: cd vendor/scanner && npm install && npm run build

      - run: npm install

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.SCANNER_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install build tools for node-pty
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Build scanner
        run: cd vendor/scanner && npm install && npm run build

      - run: npm install

      - run: npm test
