name: Release

on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      publish:
        description: "Run semantic-release (tag + GitHub Release). When false, only the precheck runs — use for dry-run CI validation on a feature branch."
        type: boolean
        default: false

jobs:
  # Quick (~30s) sanity check before we burn the matrix. Runs semantic-release
  # in dry-run mode to decide whether a release would happen at all. If not,
  # we short-circuit and don't pay for the four-arch native build.
  #
  # The build matrix and the real release both gate on `should_release`. On
  # push, this means a commit with no `feat:`/`fix:` etc. lands with zero CI
  # cost beyond this job. On workflow_dispatch with publish=false, the precheck
  # runs (useful for validating workflow changes) but neither build nor publish
  # follows — same shape as the old `if: github.event_name == 'push' || ...`
  # gate, just expressed at job granularity instead of step granularity.
  release-precheck:
    name: Precheck
    runs-on: ubuntu-latest
    permissions:
      # semantic-release --dry-run probes push access via verifyConditions
      # (git push --dry-run). With contents:read that probe fails with
      # EGITNOPERMISSION before commit-analyzer runs, so the "next release
      # version" line is never printed and the precheck false-negatives
      # as "no release-worthy commits". contents:write makes the probe
      # pass; nothing is actually pushed here because this is a --dry-run
      # (semantic-release skips the prepare/publish phases, so the
      # @semantic-release/git commit + push never run during precheck).
      contents: write
    outputs:
      should_release: ${{ steps.precheck.outputs.should_release }}
      next_version: ${{ steps.precheck.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Dry-run semantic-release
        id: precheck
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # We only need commit-analyzer's verdict; semantic-release prints
        # "The next release version is X" before the prepare phase runs.
        # The prepare plugin (`@semantic-release/exec` invoking
        # build-manifest.mjs) WILL fail in dry-run because release-artifacts/
        # is empty — but the line we care about has already been emitted by
        # then, so we deliberately swallow the exit code and grep stdout.
        run: |
          set -uo pipefail
          npx semantic-release --dry-run 2>&1 | tee /tmp/sr.log || true
          if grep -qE 'The next release version is ' /tmp/sr.log; then
            VERSION=$(grep -E 'The next release version is ' /tmp/sr.log | tail -n1 | sed -E 's/.*The next release version is ([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?).*/\1/')
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "next_version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "✅ Would release v$VERSION"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "next_version=" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No release-worthy commits — skipping build + publish."
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: release-precheck
    if: needs.release-precheck.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Linux build tools for node-pty
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Build streamer
        run: npm run build

      - name: Verify dist contains cli.cjs
        # Defense against a recurrence of the v1.2.0 silent-failure mode where
        # the published artifacts were missing/wrong. If tsup ever ships a
        # broken cli.cjs (zero-byte, missing entry, etc.) we want this job to
        # turn red here rather than ship a broken tarball.
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/cli.cjs
          # cli.cjs must be self-executable (has a shebang).
          head -c 16 dist/cli.cjs | grep -q '^#!'

      - name: Pack platform tarball
        run: node scripts/pack-platform.mjs --out release-artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: release-artifacts/threadbase-streamer-*.tgz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Release
    needs: [release-precheck, build]
    # Only publish on push events with a release-worthy commit, or on a
    # workflow_dispatch that explicitly asked to publish. The precheck already
    # gates the build matrix; this second check protects against someone
    # running workflow_dispatch with publish=false and a release-worthy commit
    # on the branch (which would still skip the publish step but allow the
    # build to run for sanity).
    if: |
      needs.release-precheck.outputs.should_release == 'true' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Linux build tools for node-pty
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Download all platform tarballs
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: tarball-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la release-artifacts/

      - name: Run semantic-release
        # @semantic-release/git pushes the release commit (CHANGELOG +
        # package.json bump) directly to main. main is protected by a ruleset
        # that forbids direct pushes and the GitHub Actions bot cannot be a
        # bypass actor on a user-owned repo. RELEASE_PAT is a fine-grained PAT
        # owned by the repo admin (who IS a ruleset bypass actor), so the push
        # authenticates as an exempt identity. Falls back to GITHUB_TOKEN when
        # the secret is absent (e.g. forks) — the commit-back step will then
        # fail as before, but tag/release still publish.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Build Homebrew formula
        if: success()
        run: |
          # MUST run after "Run semantic-release": build-manifest.mjs (the
          # @semantic-release/exec prepareCmd) renames the packed tarballs in
          # release-artifacts/ to their final vX.Y.Z names during prepare.
          # build-formula.mjs below globs for those final names — running this
          # step earlier would find only the pre-rename artifacts and exit 1.
          #
          # Detect the release version from the git tag semantic-release just
          # created. semantic-release tags stable releases with vX.Y.Z and
          # prereleases (from the 'next' channel) with vX.Y.Z-next.N. We only
          # publish formulas for stable releases — the regex below matches
          # bare vX.Y.Z only, rejecting any prerelease suffix.
          TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [[ -z "$TAG" ]]; then
            echo "No release tag at HEAD — semantic-release did not publish. Skipping formula."
            exit 0
          fi
          VERSION="${TAG#v}"
          echo "Building formula for version $VERSION"
          mkdir -p formula-out
          node scripts/build-formula.mjs \
            --version "$VERSION" \
            --artifacts release-artifacts \
            --out formula-out/tb-streamer.rb
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "FORMULA_PATH=$PWD/formula-out/tb-streamer.rb" >> "$GITHUB_ENV"

      - name: Publish Homebrew formula
        if: env.VERSION != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/publish-formula.sh
