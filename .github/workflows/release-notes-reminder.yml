name: Release notes reminder

# Reminder-only. Posts (and removes) a sticky comment on PRs labelled
# `milestone` when no new file under docs/release-notes/ is detected in
# the PR diff. NEVER fails the job, NEVER blocks merge.
on:
  pull_request:
    types: [labeled, opened, synchronize]

permissions:
  pull-requests: write

jobs:
  reminder:
    name: Check for release notes
    runs-on: ubuntu-latest
    # Only run when the `milestone` label is on the PR. `labeled` events
    # also fire for unrelated labels, so we filter here.
    if: contains(github.event.pull_request.labels.*.name, 'milestone')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect added release-notes file in PR diff
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # gh pr diff --name-only prints "<status>\t<path>" via the GitHub
          # API; we want files added (A) under docs/release-notes/.
          ADDED=$(gh pr view "$PR_NUMBER" --json files --jq \
            '.files[] | select(.additions > 0) | .path' \
            | grep -E '^docs/release-notes/[^/]+\.md$' \
            | grep -vE '^docs/release-notes/(_template|README)\.md$' \
            || true)
          if [ -n "$ADDED" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "Detected release-notes file(s) in PR:"
            echo "$ADDED"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "No new release-notes file detected in PR."
          fi

      - name: Post reminder comment (no notes detected)
        if: steps.detect.outputs.has_notes == 'false'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- release-notes-reminder -->
            :yellow_circle: **Milestone PR** — no new release notes detected in `docs/release-notes/`. Run `/write-release-notes` locally before merging, or remove the `milestone` label if this isn't a milestone after all.

            This is a reminder only — merge is not blocked.
          edit-mode: replace

      - name: Update reminder comment to success (notes detected)
        if: steps.detect.outputs.has_notes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- release-notes-reminder -->
            :white_check_mark: Release notes detected under `docs/release-notes/`. Thanks!
          edit-mode: replace
