name: Update scanner dep

# Bumps the @threadbase-sh/scanner npm dependency to the version published by
# the scanner repo and opens an auto-merging PR against main. Fires when scanner
# publishes a release (repository_dispatch type "scanner-released",
# client_payload.tag = vX.Y.Z), or run manually.
#
# scanner used to be a vendor/scanner git submodule; it is now a published npm
# package (@threadbase-sh/scanner) wired as a normal semver dep, so this bumps
# the npm version rather than the submodule pointer — same shape as
# update-agent-types.yml.
#
# Setup required for the automatic trigger:
#   1. scanner's release/notify workflow dispatches this event using a PAT
#      stored there (the default GITHUB_TOKEN cannot dispatch across repos).
#   2. Add a PAT secret SCANNER_VER_BUMP_PAT here (fine-grained: Contents
#      read/write + Pull requests read/write on this repo). PRs created with the
#      default GITHUB_TOKEN do NOT trigger CI (GitHub's recursion guard), so
#      auto-merge would never see required checks pass. The PAT makes the bump PR
#      run CI and lets `gh pr merge --auto` complete.

on:
  repository_dispatch:
    types: [scanner-released]
  workflow_dispatch:
    inputs:
      tag:
        description: "scanner version to pin (e.g. v0.9.5). Defaults to npm latest when omitted."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump @threadbase-sh/scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the PAT so the resulting PR triggers CI and can auto-merge.
          token: ${{ secrets.SCANNER_VER_BUMP_PAT || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Resolve target version
        id: ver
        env:
          # repository_dispatch sends vX.Y.Z; workflow_dispatch sends a bare
          # input; both are normalized to a tag-less semver below.
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          raw="${DISPATCH_TAG:-$INPUT_TAG}"
          if [ -z "$raw" ]; then
            raw=$(npm view @threadbase-sh/scanner version)
          fi
          version="${raw#v}"
          # client_payload is attacker-controllable; reject anything that is not
          # a bare semver before it reaches npm install / git / gh.
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::refusing non-semver version '$version'"; exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          current=$(node -p "require('./package.json').dependencies['@threadbase-sh/scanner'] || ''")
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Target: $version. Current spec: $current."

      - name: Bump dependency and refresh lockfile
        id: bump
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          npm install --save-exact "@threadbase-sh/scanner@${VERSION}" --no-audit --no-fund
          if git diff --quiet -- package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already at ${VERSION} — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open bump PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SCANNER_VER_BUMP_PAT || github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          branch="chore/bump-scanner-v${VERSION}"
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists — a bump PR is already open. Skipping."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add package.json package-lock.json
          git commit -m "chore: bump @threadbase-sh/scanner to v${VERSION}"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "chore: bump @threadbase-sh/scanner to v${VERSION}" \
            --body "Automated dependency bump to scanner \`v${VERSION}\`, triggered by a scanner release. \`package.json\` and \`package-lock.json\` were refreshed via \`npm install\`. Merges automatically once CI is green."
          gh pr merge --auto --squash "$branch"
